<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Panel MM · Bel-Ray — Anglo American Los Bronces</title>
<style>
  :root{
    --bg:#0B1220; --panel:#131C2E; --panel2:#1A2438; --line:#243049;
    --text:#E8EDF6; --muted:#8A97AD; --dim:#5E6B82;
    --verde:#3FB950; --verdeBg:#132819;
    --ambar:#E3A008; --ambarBg:#2A2109;
    --rojo:#F0616D; --rojoBg:#2A1216;
    --azul:#3B82F6; --azulBg:#0E1D33;
    --acento:#4FD1C5;
  }
  *{margin:0;padding:0;box-sizing:border-box}
  body{
    background:var(--bg); color:var(--text);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif;
    padding:20px; min-height:100vh;
  }
  .top{
    display:flex; justify-content:space-between; align-items:center;
    border-bottom:1px solid var(--line); padding-bottom:14px; margin-bottom:18px;
  }
  .brand{display:flex; align-items:baseline; gap:12px}
  .brand h1{font-size:20px; font-weight:600; letter-spacing:0.5px}
  .brand .sub{font-size:12px; color:var(--muted)}
  .status{display:flex; align-items:center; gap:18px; font-size:12px; color:var(--muted)}
  .live{display:flex; align-items:center; gap:6px}
  .dot{width:8px; height:8px; border-radius:50%; background:var(--verde); animation:pulse 2s infinite}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:0.3}}
  .clock{font-variant-numeric:tabular-nums; font-size:14px; color:var(--text)}

  .kpis{display:grid; grid-template-columns:repeat(4,1fr); gap:12px; margin-bottom:20px}
  .kpi{background:var(--panel); border:1px solid var(--line); border-radius:12px; padding:14px 16px}
  .kpi .label{font-size:11px; color:var(--muted); text-transform:uppercase; letter-spacing:0.5px}
  .kpi .value{font-size:30px; font-weight:700; margin-top:4px; font-variant-numeric:tabular-nums}
  .kpi .value small{font-size:15px; color:var(--muted); font-weight:400}

  .section-title{font-size:13px; color:var(--muted); text-transform:uppercase; letter-spacing:1px; margin:6px 0 12px}

  .grid{display:grid; grid-template-columns:repeat(auto-fill,minmax(340px,1fr)); gap:14px}
  .card{
    background:var(--panel); border:1px solid var(--line); border-radius:12px;
    padding:16px 18px; position:relative; overflow:hidden;
  }
  .card.crit{border-left:4px solid var(--rojo)}
  .card.warn{border-left:4px solid var(--ambar)}
  .card.ok{border-left:4px solid var(--verde)}
  .card-head{display:flex; justify-content:space-between; align-items:flex-start; margin-bottom:4px}
  .equipo{font-size:17px; font-weight:600}
  .ot{font-size:11px; color:var(--dim); font-family:ui-monospace,monospace; margin-top:2px}
  .pill{font-size:11px; font-weight:600; padding:3px 10px; border-radius:20px; white-space:nowrap}
  .pill.crit{background:var(--rojoBg); color:var(--rojo)}
  .pill.warn{background:var(--ambarBg); color:var(--ambar)}
  .pill.ok{background:var(--verdeBg); color:var(--verde)}
  .actividad{font-size:13px; color:var(--muted); margin:8px 0 14px; line-height:1.4}

  .prog-wrap{margin-bottom:12px}
  .prog-top{display:flex; justify-content:space-between; align-items:baseline; margin-bottom:6px}
  .prog-pct{font-size:22px; font-weight:700; font-variant-numeric:tabular-nums}
  .prog-hrs{font-size:11px; color:var(--dim)}
  .bar{height:10px; background:var(--panel2); border-radius:6px; overflow:hidden}
  .bar-fill{height:100%; border-radius:6px; transition:width 0.6s ease}
  .fill-ok{background:var(--verde)} .fill-warn{background:var(--ambar)} .fill-crit{background:var(--rojo)}

  .terreno{display:flex; align-items:center; gap:8px; padding-top:12px; border-top:1px solid var(--line); font-size:12px}
  .terreno .icon{color:var(--acento)}
  .terreno .nadie{color:var(--dim)}
  .persona{background:var(--azulBg); color:#7FB2F5; padding:2px 9px; border-radius:14px; font-size:11px; font-weight:500}
  .en-terreno-tag{
    position:absolute; top:14px; right:14px; display:none;
  }

  .empty{color:var(--dim); text-align:center; padding:40px; font-size:14px}
  .footer{margin-top:24px; text-align:center; font-size:11px; color:var(--dim)}
  @media(max-width:640px){
    .kpis{grid-template-columns:repeat(2,1fr)}
    .grid{grid-template-columns:1fr}
  }
</style>
</head>
<body>
  <div class="top">
    <div class="brand">
      <h1>PANEL MANTENCIÓN MAYOR</h1>
      <span class="sub">Bel-Ray · Anglo American Los Bronces · Tareas Críticas</span>
    </div>
    <div class="status">
      <div class="live"><span class="dot"></span> EN VIVO</div>
      <div class="clock" id="clock">--:--:--</div>
    </div>
  </div>

  <div class="kpis" id="kpis"></div>

  <div class="section-title">Frentes críticos en tiempo real</div>
  <div class="grid" id="grid">
    <div class="empty">Cargando datos del Sheet…</div>
  </div>

  <div class="footer" id="footer">Última actualización: — · Se refresca automáticamente cada 30 segundos</div>

<script>
// ============================================================
//  CONFIGURACIÓN — pega las URLs de tus dos hojas publicadas
// ============================================================
//  Necesitas publicar DOS pestañas como CSV:
//  Archivo > Compartir > Publicar en la web
//    1) pestaña CAPTURA      > CSV  → pégala en SHEET_CSV_URL
//    2) pestaña REGISTRO_NFC > CSV  → pégala en NFC_CSV_URL
//  Si las dejas vacías, el panel usa datos de ejemplo.
const SHEET_CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vSdA3xg-NepBQFQy3QwQoRINx_AIP_-_ie2Clpq0lLLe56Fm1FokEW4A5VwTwiY13nYtXsBJQKde8wM/pub?gid=1096962834&single=true&output=csv";   // CAPTURA (tareas)
const NFC_CSV_URL   = "https://docs.google.com/spreadsheets/d/e/2PACX-1vSdA3xg-NepBQFQy3QwQoRINx_AIP_-_ie2Clpq0lLLe56Fm1FokEW4A5VwTwiY13nYtXsBJQKde8wM/pub?gid=545760247&single=true&output=csv";   // REGISTRO_NFC (personas en terreno)
const REFRESH_MS = 30000; // 30 segundos

// Datos de ejemplo (tu data real del 11-07) mientras conectas el Sheet
const DATOS_EJEMPLO = [
  {equipo:"Molino SAG", ot:"4013457119", actividad:"Cambio sellos perimetrales MLS001 inferiores", avance:25, hrs:8, criticidad:"Alta", enTerreno:["D. Herrera","J. Molina"]},
  {equipo:"Molino de Bolas N°2", ot:"4012442142", actividad:"Bombas y sistema de lubricación (17 sub-tareas)", avance:12, hrs:17, criticidad:"Alta", enTerreno:["F. Manqueche"]},
  {equipo:"Molino SAG", ot:"4012441947", actividad:"Sello molino SAG cambio y lubricación alimentación", avance:0, hrs:4, criticidad:"Alta", enTerreno:[]},
  {equipo:"Molino de Bolas N°1", ot:"4013457118", actividad:"Cambio sellos perimetrales MLB001", avance:100, hrs:30, criticidad:"Alta", enTerreno:[]},
  {equipo:"Planta de Cal", ot:"4015377192", actividad:"Cambio de sellos y aceite", avance:0, hrs:6, criticidad:"Alta", enTerreno:[], bloqueado:"Sin MAF ni repuestos"},
];

function nivel(av, bloqueado){
  if(bloqueado) return "warn";
  if(av >= 100) return "ok";
  if(av < 50) return "crit";
  return "warn";
}
function pillText(av, bloqueado){
  if(bloqueado) return "BLOQUEADO";
  if(av >= 100) return "COMPLETADA";
  if(av === 0) return "SIN INICIAR";
  return "EN PROCESO";
}

function render(datos){
  // KPIs
  const total = datos.length;
  const completas = datos.filter(d=>d.avance>=100).length;
  const enProceso = datos.filter(d=>d.avance>0 && d.avance<100).length;
  const personas = datos.reduce((s,d)=>s + (d.enTerreno?d.enTerreno.length:0), 0);
  const avgGlobal = total ? Math.round(datos.reduce((s,d)=>s + d.avance*d.hrs,0) / datos.reduce((s,d)=>s+d.hrs,0)) : 0;

  document.getElementById("kpis").innerHTML = `
    <div class="kpi"><div class="label">Avance crítico</div><div class="value">${avgGlobal}<small>%</small></div></div>
    <div class="kpi"><div class="label">Frentes críticos</div><div class="value">${total}</div></div>
    <div class="kpi"><div class="label">Completados</div><div class="value">${completas}<small>/${total}</small></div></div>
    <div class="kpi"><div class="label">Personas en terreno</div><div class="value">${personas}</div></div>
  `;

  // Ordena: primero lo crítico incompleto, luego el resto
  datos.sort((a,b)=>{
    const na = a.avance>=100?2:(a.avance<50?0:1);
    const nb = b.avance>=100?2:(b.avance<50?0:1);
    return na - nb;
  });

  const grid = document.getElementById("grid");
  if(!datos.length){ grid.innerHTML = '<div class="empty">No hay tareas críticas cargadas.</div>'; return; }

  grid.innerHTML = datos.map(d=>{
    const nv = nivel(d.avance, d.bloqueado);
    const gente = (d.enTerreno && d.enTerreno.length)
      ? d.enTerreno.map(p=>`<span class="persona">${p}</span>`).join(" ")
      : '<span class="nadie">Sin personal en terreno ahora</span>';
    const detalle = d.bloqueado ? `⚠ ${d.bloqueado}` : d.actividad;
    return `
      <div class="card ${nv}">
        <div class="card-head">
          <div>
            <div class="equipo">${d.equipo}</div>
            <div class="ot">OT ${d.ot}</div>
          </div>
          <span class="pill ${nv}">${pillText(d.avance, d.bloqueado)}</span>
        </div>
        <div class="actividad">${detalle}</div>
        <div class="prog-wrap">
          <div class="prog-top">
            <span class="prog-pct">${d.avance}%</span>
            <span class="prog-hrs">${d.hrs} hrs estimadas</span>
          </div>
          <div class="bar"><div class="bar-fill fill-${nv}" style="width:${d.avance}%"></div></div>
        </div>
        <div class="terreno">
          <span class="icon">●</span>
          <span>En terreno:</span>
          ${gente}
        </div>
      </div>
    `;
  }).join("");
}

// ====== CONEXIÓN AL SHEET (dos hojas, cruce por OT) ======
async function cargarSheet(){
  if(!SHEET_CSV_URL){
    render(DATOS_EJEMPLO);
    actualizarFooter("datos de ejemplo");
    return;
  }
  try{
    // 1) tareas críticas desde CAPTURA
    const resTareas = await fetch(SHEET_CSV_URL + "&_=" + Date.now());
    const tareas = parseCSV(await resTareas.text());

    // 2) personas en terreno desde REGISTRO_NFC (si está configurada)
    let personas = [];
    if(NFC_CSV_URL){
      const resNFC = await fetch(NFC_CSV_URL + "&_=" + Date.now());
      personas = parseNFC(await resNFC.text());
    }

    // 3) cruce por OT: a cada tarea le asigna quién está en terreno en esa OT
    tareas.forEach(t=>{
      t.enTerreno = personas
        .filter(p=> p.ot === t.ot && p.estado === "en terreno")
        .map(p=> p.persona);
    });

    render(tareas);
    actualizarFooter(NFC_CSV_URL ? "Sheet + NFC en vivo" : "Sheet en vivo (sin NFC)");
  }catch(e){
    render(DATOS_EJEMPLO);
    actualizarFooter("error de conexión, mostrando ejemplo");
  }
}

// Parser de REGISTRO_NFC → lista de {persona, ot, estado}
function parseNFC(texto){
  const lineas = texto.split("\n").filter(l=>l.trim());
  if(!lineas.length) return [];
  let headerIdx = 0;
  for(let i=0;i<Math.min(5,lineas.length);i++){
    const cols = parseLinea(lineas[i]).map(c=>c.trim().toLowerCase());
    if(cols.some(c=>c.includes("persona"))){ headerIdx = i; break; }
  }
  const headers = parseLinea(lineas[headerIdx]).map(h=>h.trim().toLowerCase());
  const idx = {
    persona: headers.findIndex(h=>h.includes("persona")),
    ot: headers.findIndex(h=>h==="ot"),
    estado: headers.findIndex(h=>h.includes("estado")),
  };
  const res = [];
  for(let i=headerIdx+1;i<lineas.length;i++){
    const c = parseLinea(lineas[i]);
    if(!c[idx.persona]) continue;
    res.push({
      persona: c[idx.persona]||"",
      ot: String(c[idx.ot]||"").trim(),
      estado: String(c[idx.estado]||"").trim().toLowerCase()
    });
  }
  return res;
}

// Parser CSV → filtra solo críticas. Busca la fila de encabezados real
// (tu Sheet tiene un título en la fila 1, los headers están en la fila 2).
function parseCSV(texto){
  const lineas = texto.split("\n").filter(l=>l.trim());
  // Busca entre las primeras 5 líneas la que contenga "equipo" → esa es el header real
  let headerIdx = 0;
  for(let i=0;i<Math.min(5,lineas.length);i++){
    const cols = parseLinea(lineas[i]).map(c=>c.trim().toLowerCase());
    if(cols.some(c=>c.includes("equipo"))){ headerIdx = i; break; }
  }
  const headers = parseLinea(lineas[headerIdx]).map(h=>h.trim().toLowerCase());
  const idx = {
    equipo: headers.findIndex(h=>h.includes("equipo")),
    ot: headers.findIndex(h=>h==="ot"),
    actividad: (function(){
      let i = headers.findIndex(h=>h==="actividad");
      if(i<0) i = headers.findIndex(h=>h.includes("actividad") && h!=="tipo actividad");
      return i;
    })(),
    avance: headers.findIndex(h=>h.includes("avance")),
    hrs: headers.findIndex(h=>h.includes("hrs")||h.includes("total")),
    criticidad: headers.findIndex(h=>h.includes("criticidad")),
    bloqueado: headers.findIndex(h=>h.includes("bloqueado")||h.includes("pausado")),
  };
  const filas = [];
  for(let i=headerIdx+1;i<lineas.length;i++){
    const c = parseLinea(lineas[i]);
    if(!c[idx.equipo] || !c[idx.equipo].trim()) continue;
    // SOLO críticas
    if(idx.criticidad>=0 && !String(c[idx.criticidad]).toLowerCase().includes("alta")) continue;
    filas.push({
      equipo: c[idx.equipo]||"",
      ot: c[idx.ot]||"",
      actividad: c[idx.actividad]||"",
      avance: parseInt(String(c[idx.avance]).replace(/[^0-9]/g,""))||0,
      hrs: parseFloat(c[idx.hrs])||0,
      criticidad: c[idx.criticidad]||"",
      bloqueado: idx.bloqueado>=0 ? (c[idx.bloqueado]||"") : "",
      enTerreno: [] // se llena desde la hoja REGISTRO_NFC (ver Apps Script)
    });
  }
  return filas;
}
function parseLinea(linea){
  const res=[]; let cur=""; let dentro=false;
  for(let i=0;i<linea.length;i++){
    const ch=linea[i];
    if(ch==='"'){ dentro=!dentro; }
    else if(ch===',' && !dentro){ res.push(cur); cur=""; }
    else cur+=ch;
  }
  res.push(cur);
  return res.map(s=>s.trim());
}

function actualizarFooter(fuente){
  const ahora = new Date().toLocaleTimeString("es-CL",{timeZone:"America/Santiago"});
  document.getElementById("footer").textContent =
    `Última actualización: ${ahora} · Fuente: ${fuente} · Se refresca cada 30 segundos`;
}

function tick(){
  const ahora = new Date().toLocaleTimeString("es-CL",{timeZone:"America/Santiago"});
  document.getElementById("clock").textContent = ahora;
}

// Init
tick(); setInterval(tick, 1000);
cargarSheet(); setInterval(cargarSheet, REFRESH_MS);
</script>
</body>
</html>
