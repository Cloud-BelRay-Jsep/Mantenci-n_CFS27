<script>
const CAPTURA_CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vSdA3xg-NepBQFQy3QwQoRINx_AIP_-_ie2Clpq0lLLe56Fm1FokEW4A5VwTwiY13nYtXsBJQKde8wM/pub?gid=1096962834&single=true&output=csv";
const NFC_CSV_URL     = "https://docs.google.com/spreadsheets/d/e/2PACX-1vSdA3xg-NepBQFQy3QwQoRINx_AIP_-_ie2Clpq0lLLe56Fm1FokEW4A5VwTwiY13nYtXsBJQKde8wM/pub?gid=545760247&single=true&output=csv";
// Publica la pestaña CERTIFICACIONES igual que las otras (Archivo > Compartir > Publicar en la web > CSV) y pega su link aquí:
const CERTS_CSV_URL   = "https://docs.google.com/spreadsheets/d/e/2PACX-1vSdA3xg-NepBQFQy3QwQoRINx_AIP_-_ie2Clpq0lLLe56Fm1FokEW4A5VwTwiY13nYtXsBJQKde8wM/pub?gid=1733484865&single=true&output=csv";
const REFRESH_MS = 20000;

const params = new URLSearchParams(window.location.search);
const OT_SELECCIONADA = (params.get("ot") || "").trim();

function parseLinea(linea){
  const res=[]; let cur=""; let dentro=false;
  for(let i=0;i<linea.length;i++){
    const ch=linea[i];
    if(ch==='"'){ dentro=!dentro; }
    else if(ch===',' && !dentro){ res.push(cur); cur=""; }
    else cur+=ch;
  }
  res.push(cur);
  return res.map(s=>s.trim());
}
function parseNum(raw){
  let s = String(raw||"").trim().replace(",",".");
  let v = parseFloat(s);
  return isNaN(v) ? 0 : v;
}

function parseAvance(raw){
  let s = String(raw||"").trim().replace("%","").replace(",",".");
  let v = parseFloat(s);
  if(isNaN(v)) return 0;
  return Math.round(v);
}

function encontrarHeader(lineas, clave){
  for(let i=0;i<Math.min(5,lineas.length);i++){
    const cols = parseLinea(lineas[i]).map(c=>c.trim().toLowerCase());
    if(cols.some(c=>c.includes(clave))) return i;
  }
  return 0;
}

// Ventanas de tiempo planificadas del Gantt (OT: [inicio, término]).
// Tomado de Carta_Gantt_MM_Planta_Confluencia_Julio_2026 — inicio más temprano
// y término más tardío entre todas las tareas de cada OT.
const GANTT_FECHAS = {

  "4011493322": ["06-07-2026 16:00","07-07-2026 12:00"],

async function cargarCaptura(){
  const res = await fetch(CAPTURA_CSV_URL + "&_=" + Date.now());
  const texto = await res.text();
  const lineas = texto.split("\n").filter(l=>l.trim());
  const hIdx = encontrarHeader(lineas, "equipo");
  const headers = parseLinea(lineas[hIdx]).map(h=>h.trim().toLowerCase());
  const idx = {
    equipo: headers.findIndex(h=>h.includes("equipo")),
    ot: headers.findIndex(h=>h==="ot"),
    actividad: (function(){
      let i = headers.findIndex(h=>h==="actividad");
      if(i<0) i = headers.findIndex(h=>h.includes("actividad") && h!=="tipo actividad");
      return i;
    })(),
    componente: headers.findIndex(h=>h.includes("componente")),
    fechaInicio: headers.findIndex(h=>h.includes("fecha inicio")),
    avance: headers.findIndex(h=>h.includes("avance")),
    hrs: headers.findIndex(h=>h.includes("hrs")||h.includes("total")),
    estado: headers.findIndex(h=>h==="estado"),
    resp: headers.findIndex(h=>h.includes("auxiliar")),
    criticidad: headers.findIndex(h=>h.includes("criticidad")),
    bloqueado: headers.findIndex(h=>h.includes("bloqueado")||h.includes("pausado")),
  };
  const filas = [];
  for(let i=hIdx+1;i<lineas.length;i++){
    const c = parseLinea(lineas[i]);
    if(!c[idx.equipo] || !c[idx.equipo].trim()) continue;
    filas.push({
      equipo:c[idx.equipo]||"", ot:(c[idx.ot]||"").trim(), actividad:c[idx.actividad]||"",
      componente: idx.componente>=0 ? (c[idx.componente]||"") : "",
      fechaInicio: idx.fechaInicio>=0 ? (c[idx.fechaInicio]||"") : "",
      avance:parseAvance(c[idx.avance]),
      hrs:parseNum(c[idx.hrs]), estado:c[idx.estado]||"",
      resp:c[idx.resp]||"", criticidad:c[idx.criticidad]||"",
      bloqueado: idx.bloqueado>=0 ? (c[idx.bloqueado]||"") : ""
    });
  }
  return filas;
}

async function cargarNFC(){
  const res = await fetch(NFC_CSV_URL + "&_=" + Date.now());
  const texto = await res.text();
  const lineas = texto.split("\n").filter(l=>l.trim());
  if(!lineas.length) return [];
  const hIdx = encontrarHeader(lineas, "persona");
  const headers = parseLinea(lineas[hIdx]).map(h=>h.trim().toLowerCase());
  const idx = {
    persona: headers.findIndex(h=>h.includes("persona")),
    ot: headers.findIndex(h=>h==="ot"),
    fecha: headers.findIndex(h=>h.includes("fecha")),
    hEnt: headers.findIndex(h=>h.includes("entrada")),
    hSal: headers.findIndex(h=>h.includes("salida")),
    dur: headers.findIndex(h=>h.includes("duraci")),
    estado: headers.findIndex(h=>h.includes("estado")),
  };
  const res2 = [];
  for(let i=hIdx+1;i<lineas.length;i++){
    const c = parseLinea(lineas[i]);
    if(!c[idx.persona]) continue;
    res2.push({
      persona:c[idx.persona]||"", ot:(c[idx.ot]||"").trim(), fecha:c[idx.fecha]||"",
      hEnt:c[idx.hEnt]||"", hSal:c[idx.hSal]||"", dur:c[idx.dur]||"",
      estado:(c[idx.estado]||"").toLowerCase()
    });
  }
  return res2;
}

function norm(s){ return String(s||"").trim().toLowerCase(); }

// Parsea "DD-MM-YYYY HH:mm" (formato de Fecha Inicio en CAPTURA). Devuelve Date o null.
function parseFechaHoraCL(s){
  if(!s) return null;
  const m = String(s).trim().match(/^(\d{1,2})-(\d{1,2})-(\d{4})\s+(\d{1,2}):(\d{2})/);
  if(!m) return null;
  const d = new Date(parseInt(m[3]), parseInt(m[2])-1, parseInt(m[1]), parseInt(m[4]), parseInt(m[5]));
  return isNaN(d) ? null : d;
}
const DIAS_SEMANA = ["DOM","LUN","MAR","MIÉ","JUE","VIE","SÁB"];

let certsData = [];

async function cargarCerts(){
  if(!CERTS_CSV_URL) return [];
  try{
    const res = await fetch(CERTS_CSV_URL + "&_=" + Date.now());
    const texto = await res.text();
    const lineas = texto.split("\n").filter(l=>l.trim());
    // busca la fila de encabezados: "persona" (hoja del indexador) o "nombres" (hoja RRHH)
    let hIdx = 0;
    for(let i=0;i<Math.min(5,lineas.length);i++){
      const cols = parseLinea(lineas[i]).map(c=>c.trim().toLowerCase());
      if(cols.some(c=>c.includes("persona")||c.includes("nombres"))){ hIdx=i; break; }
    }
    const headers = parseLinea(lineas[hIdx]).map(h=>h.trim().toLowerCase());
    function col(nombres){ // primer header que coincida EXACTO con alguno de los nombres dados
      for(const n of nombres){ const i = headers.indexOf(n); if(i>=0) return i; }
      return -1;
    }
    const idx = {
      persona: col(["persona","nombres"]),
      cargo: col(["cargo"]),
      cert: col(["documento","nombre_documento","documento_descripcion","tipo_documento"]),
      emision: col(["fecha_emision"]),
      vencimiento: col(["fecha_vencimiento"]),
      activo: col(["documento_activo"]),
      link: col(["link documento","link","url"]),
    };
    const filas=[];
    for(let i=hIdx+1;i<lineas.length;i++){
      const c = parseLinea(lineas[i]);
      if(!c[idx.persona] || !c[idx.persona].trim()) continue;
      if(idx.activo>=0 && String(c[idx.activo]).toLowerCase()==="false") continue; // omite documentos inactivos
      filas.push({
        persona:c[idx.persona]||"", cargo:idx.cargo>=0?(c[idx.cargo]||""):"",
        cert:idx.cert>=0?(c[idx.cert]||"Documento"):"Documento",
        emision:idx.emision>=0?(c[idx.emision]||""):"",
        vencimiento:idx.vencimiento>=0?(c[idx.vencimiento]||""):"",
        link:idx.link>=0?(c[idx.link]||""):""
      });
    }
    return filas;
  }catch(e){ return []; }
}

// Normaliza quitando tildes, espacios extra y mayúsculas (para comparar nombres)
function normName(s){
  return String(s||"").normalize("NFD").replace(/[\u0300-\u036f]/g,"")
    .trim().toLowerCase().replace(/\s+/g," ");
}
// Coincidencia flexible: todas las palabras del nombre más corto deben estar en el más largo
function personaCoincide(a, b){
  const na = normName(a), nb = normName(b);
  if(!na || !nb) return false;
  if(na===nb) return true;
  const ta = na.split(" "), tb = nb.split(" ");
  const corto = ta.length<=tb.length ? ta : tb;
  const largo = ta.length<=tb.length ? tb : ta;
  return corto.every(t=>largo.includes(t));
}

function formatFecha(d){
  if(!(d instanceof Date) || isNaN(d)) return "";
  const dd=String(d.getDate()).padStart(2,"0"), mm=String(d.getMonth()+1).padStart(2,"0");
  return `${dd}-${mm}-${d.getFullYear()}`;
}
function parseFechaFlexible(s){
  if(!s) return null;
  let d = new Date(s); // maneja ISO 8601 nativo ("2025-03-06T03:00:00.000Z")
  if(!isNaN(d)) return d;
  const p = String(s).split("-"); // fallback dd-mm-yyyy
  if(p.length===3){ d = new Date(parseInt(p[2]), parseInt(p[1])-1, parseInt(p[0])); if(!isNaN(d)) return d; }
  return null;
}

function estadoCert(vencStr){
  const venc = parseFechaFlexible(vencStr);
  if(!venc) return {txt:"SIN VENCIMIENTO", col:"var(--dim)", bg:"var(--panel)"};
  const hoy = new Date();
  const dias = Math.round((venc-hoy)/86400000);
  if(dias<0) return {txt:"VENCIDO", col:"var(--rojo)", bg:"var(--rojoBg)"};
  if(dias<=30) return {txt:"POR VENCER", col:"var(--ambar)", bg:"var(--ambarBg)"};
  return {txt:"VIGENTE", col:"var(--verde)", bg:"var(--verdeBg)"};
}

function abrirModalPersona(persona){
  const certs = certsData.filter(c=>personaCoincide(persona, c.persona));
  const overlay = document.createElement("div");
  overlay.className = "modal-overlay";
  overlay.onclick = (e)=>{ if(e.target===overlay) overlay.remove(); };

  const cargo = certs.length ? certs[0].cargo : "";
  let cuerpo;
  if(!CERTS_CSV_URL){
    cuerpo = '<div class="empty">Aún no está configurada la hoja de certificaciones.</div>';
  } else if(!certs.length){
    cuerpo = '<div class="empty">Sin certificaciones registradas para esta persona.</div>';
  } else {
    cuerpo = certs.map(c=>{
      const e = estadoCert(c.vencimiento);
      const fEmi = formatFecha(parseFechaFlexible(c.emision));
      const fVen = formatFecha(parseFechaFlexible(c.vencimiento));
      const fechaTxt = [fVen?('Vence: '+fVen):'', fEmi?('Emitido: '+fEmi):''].filter(Boolean).join(' · ');
      return `
      <div class="cert-row">
        <div class="cert-top">
          <span class="cert-nombre">${c.cert}</span>
          <span class="cert-pill" style="color:${e.col};background:${e.bg}">${e.txt}</span>
        </div>
        ${fechaTxt ? `<div class="cert-fecha">${fechaTxt}</div>` : ""}
        ${c.link ? `<a class="cert-link" href="${c.link}" target="_blank" rel="noopener">Ver / descargar documento →</a>` : ""}
      </div>`;
    }).join("");
  }

  overlay.innerHTML = `
    <div class="modal-box">
      <div class="modal-top">
        <div>
          <div class="modal-nombre">${persona}</div>
          ${cargo ? `<div class="modal-cargo">${cargo}</div>` : ""}
        </div>
        <button class="modal-close" onclick="this.closest('.modal-overlay').remove()">✕</button>
      </div>
      ${cuerpo}
    </div>
  `;
  document.body.appendChild(overlay);
}
window.abrirModalPersona = abrirModalPersona;

function nivel(av){ if(av>=100) return "ok"; if(av<50) return "crit"; return "warn"; }
function colorNivel(nv){ return nv==="ok"?"var(--verde)":(nv==="crit"?"var(--rojo)":"var(--ambar)"); }

function estadoOT(o){
  if(o.bloqueado) return {clase:"pausada", etiqueta:"PAUSADA"};
  if(o.avance>=100) return {clase:"completada", etiqueta:"COMPLETADA"};
  if(o.avance===0) return {clase:"sin-iniciar", etiqueta:"SIN INICIAR"};
  return {clase:"en-proceso", etiqueta:"EN PROCESO"};
}

function tarjetaOT(o){
  const {clase, etiqueta} = estadoOT(o);
  return `
    <a class="ot-pick ${clase}" href="?ot=${encodeURIComponent(o.ot)}">
      <div class="n">OT ${o.ot} — ${o.equipo} <span class="ot-tag">${etiqueta}</span></div>
      <div class="s">${o.actividad}${o.componente ? ' · '+o.componente : ''} · ${o.avance}%</div>
    </a>`;
}

let otsGlobal = [];
let vistaActual = "lista";

function cambiarVista(v){
  vistaActual = v;
  renderVista();
}
window.cambiarVista = cambiarVista;

function toggleHtml(){
  return `
    <div class="vista-toggle">
      <button class="vt-btn ${vistaActual==='lista'?'activo':''}" onclick="cambiarVista('lista')">☰ Lista</button>
      <button class="vt-btn ${vistaActual==='gantt'?'activo':''}" onclick="cambiarVista('gantt')">▭ Gantt</button>
    </div>`;
}

function renderSelector(otsUnicas){
  otsGlobal = otsUnicas;
  document.getElementById("tituloOT").textContent = "Selecciona una OT";
  document.getElementById("subOT").textContent = "Línea de tiempo · Elige qué actividad mostrar en este panel";

function renderVista(){
  const cont = document.getElementById("contenido");
  if(vistaActual==="lista") renderVistaLista(cont);
  else renderVistaGantt(cont);
}

// ===== VISTA LISTA: agrupada por día, hora inicio–fin, tarjeta completa sin recortes =====
function renderVistaLista(cont){
  const conFecha = otsGlobal.filter(o=>o.fechaInicio && o.fechaTermino).sort((a,b)=>a.fechaInicio-b.fechaInicio);
  const sinFecha = otsGlobal.filter(o=>!o.fechaInicio || !o.fechaTermino);

  let html = toggleHtml() + '<div class="selector">';

  if(conFecha.length){
    const porDia = {}, ordenDias = [];
    conFecha.forEach(o=>{
      const key = o.fechaInicio.toDateString();
      if(!porDia[key]){ porDia[key]=[]; ordenDias.push(key); }
      porDia[key].push(o);
    });
    html += ordenDias.map(key=>{
      const items = porDia[key];
      const d = items[0].fechaInicio;
      const diaTxt = `${DIAS_SEMANA[d.getDay()]} ${String(d.getDate()).padStart(2,"0")}-${String(d.getMonth()+1).padStart(2,"0")}`;
      return `
        <div class="dia-header">${diaTxt}</div>
        ${items.map(o=>{
          const hIni = `${String(o.fechaInicio.getHours()).padStart(2,"0")}:${String(o.fechaInicio.getMinutes()).padStart(2,"0")}`;
          const hFin = `${String(o.fechaTermino.getHours()).padStart(2,"0")}:${String(o.fechaTermino.getMinutes()).padStart(2,"0")}`;
          return `
          <div class="timeline-item">
            <div class="time-badge">${hIni}<span class="hasta">hasta</span>${hFin}</div>
            <div class="timeline-card">${tarjetaOT(o)}</div>
          </div>`;
        }).join("")}
      `;
    }).join("");
  }

  if(sinFecha.length){
    html += `<div class="dia-header sinfecha-header">SIN FECHA EN EL GANTT (${sinFecha.length})</div>`;
    html += sinFecha.map(o=>`<div style="margin-bottom:8px">${tarjetaOT(o)}</div>`).join("");
  }

  html += '</div>';
  cont.innerHTML = html;
}

// ===== VISTA GANTT: compacta, barras cortas con OT+%, detalle completo en tooltip =====
function renderVistaGantt(cont){
  const conFecha = otsGlobal.filter(o=>o.fechaInicio && o.fechaTermino);
  const sinFecha = otsGlobal.filter(o=>!o.fechaInicio || !o.fechaTermino);

  let html = toggleHtml() + '<div class="selector">';

  if(conFecha.length){
    const PX_HORA = 10, ALTO_FILA = 40, ANCHO_MIN = 155;
    const minFecha = new Date(Math.min(...conFecha.map(o=>o.fechaInicio)));
    const maxFecha = new Date(Math.max(...conFecha.map(o=>o.fechaTermino)));
    const inicioGrilla = new Date(minFecha.getFullYear(), minFecha.getMonth(), minFecha.getDate());
    const finGrilla = new Date(maxFecha.getFullYear(), maxFecha.getMonth(), maxFecha.getDate()+1);
    const totalDias = Math.round((finGrilla - inicioGrilla) / 86400000);
    const anchoTotal = totalDias * 24 * PX_HORA;

    let headerHtml = '', gridHtml = '';
    for(let d=0; d<totalDias; d++){
      const fecha = new Date(inicioGrilla.getTime() + d*86400000);
      const ancho = 24 * PX_HORA;
      headerHtml += `<div class="gantt-daycol" style="width:${ancho}px">${DIAS_SEMANA[fecha.getDay()]}<span class="fecha">${String(fecha.getDate()).padStart(2,"0")}-${String(fecha.getMonth()+1).padStart(2,"0")}</span></div>`;
      gridHtml += `<div class="gantt-gridline" style="left:${d*ancho}px"></div>`;
    }

    const ordenadas = conFecha.slice().sort((a,b)=>a.fechaInicio-b.fechaInicio);
    let barsHtml = '';
    ordenadas.forEach((o,i)=>{
      const {clase, etiqueta} = estadoOT(o);
      const left = Math.round((o.fechaInicio - inicioGrilla) / 3600000 * PX_HORA);
      const width = Math.max(ANCHO_MIN, Math.round((o.fechaTermino - o.fechaInicio) / 3600000 * PX_HORA));
      const hIni = `${String(o.fechaInicio.getHours()).padStart(2,"0")}:${String(o.fechaInicio.getMinutes()).padStart(2,"0")}`;
      const hFin = `${String(o.fechaTermino.getHours()).padStart(2,"0")}:${String(o.fechaTermino.getMinutes()).padStart(2,"0")}`;
      barsHtml += `
        <a class="gantt-bar ${clase}" href="?ot=${encodeURIComponent(o.ot)}"
           title="OT ${o.ot} — ${o.equipo} · ${o.actividad}${o.componente?' · '+o.componente:''} · ${hIni}–${hFin} · ${etiqueta} · ${o.avance}%"
           style="left:${left}px; width:${width}px; top:${i*(ALTO_FILA+6)}px">
          <span class="gb-nombre">OT ${o.ot} — ${o.equipo}</span>
          <span class="gb-hora">${hIni}–${hFin} · ${o.avance}%</span>
        </a>`;
    });

    const altoTotal = ordenadas.length * (ALTO_FILA+6);

    html += `
      <div class="gantt-scroll">
        <div class="gantt-inner" style="width:${anchoTotal}px">
          <div class="gantt-header">${headerHtml}</div>
          <div class="gantt-body" style="height:${altoTotal}px">
            ${gridHtml}
            ${barsHtml}
          </div>
        </div>
      </div>
      <div class="gantt-hint">Pasa el mouse sobre una barra para ver el detalle completo</div>`;
  }

  if(sinFecha.length){
    html += `<div class="dia-header sinfecha-header">SIN FECHA EN EL GANTT (${sinFecha.length})</div>`;
    html += sinFecha.map(o=>`<div style="margin-bottom:8px">${tarjetaOT(o)}</div>`).join("");
  }

  html += '</div>';
  cont.innerHTML = html;
}

function render(actividades, personas){
  const eq = actividades[0].equipo;
  document.getElementById("tituloOT").textContent = "OT " + OT_SELECCIONADA;
  document.getElementById("subOT").textContent = eq + " · Anglo American Los Bronces";

  const hrsTot = actividades.reduce((s,a)=>s+a.hrs,0);
  const avanceGlobal = actividades.length>0 ? Math.round(actividades.reduce((s,a)=>s+a.avance,0)/actividades.length) : 0;
  const nv = nivel(avanceGlobal);
  const col = colorNivel(nv);
  const completas = actividades.filter(a=>a.avance>=100).length;
  const bloqueadas = actividades.filter(a=>a.bloqueado).length;
  const estadoTxt = bloqueadas>0 ? "BLOQUEADO" : (avanceGlobal>=100?"COMPLETADA":(avanceGlobal===0?"SIN INICIAR":"EN PROCESO"));
  const estadoBg = nv==="ok"?"var(--verdeBg)":(nv==="crit"?"var(--rojoBg)":"var(--ambarBg)");

  const R=80, C=2*Math.PI*R, off = C - (avanceGlobal/100)*C;

  const personasOT = personas.filter(p=>p.ot===OT_SELECCIONADA)
    .sort((a,b)=> (b.hEnt||"").localeCompare(a.hEnt||""));
  const enTerreno = personasOT.filter(p=>p.estado==="en terreno");
  const unicas = new Set(personasOT.map(p=>p.persona)).size;
  const finalizadas = personasOT.filter(p=>p.dur);
  let promDur = "—";
  if(finalizadas.length){
    const mins = finalizadas.map(p=>{
      const m = p.dur.match(/(\d+)h\s*(\d+)m/);
      return m ? parseInt(m[1])*60+parseInt(m[2]) : 0;
    });
    const avgM = Math.round(mins.reduce((a,b)=>a+b,0)/mins.length);
    promDur = Math.floor(avgM/60)+"h "+(avgM%60)+"m";
  }

  document.getElementById("contenido").innerHTML = `
    <div class="layout">
      <div class="col">
        <div class="hero">
          <div class="ring-wrap">
            <svg width="100%" height="100%" viewBox="0 0 200 200">
              <circle cx="100" cy="100" r="${R}" fill="none" stroke="var(--panel2)" stroke-width="14"/>
              <circle cx="100" cy="100" r="${R}" fill="none" stroke="${col}" stroke-width="14"
                stroke-dasharray="${C}" stroke-dashoffset="${off}" stroke-linecap="round"
                transform="rotate(-90 100 100)" style="transition:stroke-dashoffset 0.8s ease"/>
            </svg>
            <div class="ring-pct">
              <div class="num" style="color:${col}">${avanceGlobal}%</div>
              <div class="lbl">Avance</div>
            </div>
          </div>
          <span class="pill-estado" style="background:${estadoBg};color:${col}">${estadoTxt}</span>
          <div class="hero-stats">
            <div class="hstat"><div class="v">${actividades.length}</div><div class="l">Actividades</div></div>
            <div class="hstat"><div class="v">${completas}/${actividades.length}</div><div class="l">Completadas</div></div>
            <div class="hstat"><div class="v">${Math.round(hrsTot*10)/10}</div><div class="l">Hrs estimadas</div></div>
            <div class="hstat"><div class="v">${bloqueadas}</div><div class="l">Bloqueadas</div></div>
          </div>
        </div>

        <div class="metrics">
          <div class="metric"><div class="v" style="color:var(--verde)">${enTerreno.length}</div><div class="l">En terreno ahora</div></div>
          <div class="metric"><div class="v">${unicas}</div><div class="l">Personas distintas</div></div>
          <div class="metric"><div class="v">${personasOT.length}</div><div class="l">Entradas totales</div></div>
          <div class="metric"><div class="v">${promDur}</div><div class="l">Duración promedio</div></div>
        </div>
      </div>

      <div class="col">
        <div class="section-title">Desglose de actividades</div>
        <div class="col-scroll">
        ${actividades.map(a=>{
          const n = nivel(a.avance);
          const c = colorNivel(n);
          const pillBg = a.bloqueado ? "var(--ambarBg)" : (n==="ok"?"var(--verdeBg)":(n==="crit"?"var(--rojoBg)":"var(--ambarBg)"));
          const pillTxt = a.bloqueado ? "BLOQUEADA" : a.estado.toUpperCase();
          return `
          <div class="act-card">
            <div class="act-top">
              <div>
                <span class="act-name">${a.actividad}</span>
                <span class="act-pill" style="background:${pillBg};color:${c}">${pillTxt}</span>
              </div>
              <span class="act-pct" style="color:${c}">${a.avance}%</span>
            </div>
            ${a.resp ? `<div class="act-resp">${a.resp}</div>` : ""}
            <div class="bar" style="margin-top:6px"><div class="bar-fill fill-${n}" style="width:${a.avance}%"></div></div>
            ${a.bloqueado ? `<div style="margin-top:6px;font-size:11px;color:var(--ambar)">⚠ ${a.bloqueado}</div>` : ""}
          </div>`;
        }).join("")}

            </div>

              <span class="h-in">▼ ${p.hEnt||'—'}</span>
              <span class="h-out">${p.hSal ? '▲ '+p.hSal : (p.estado==='en terreno'?'En terreno':'—')}</span>
            </span>
          </div>
        `).join("")}
        </div>
      </div>
    </div>
  `;
}

let huboRenderExitoso = false;

async function cargarTodo(){
  try{
    const [captura, nfc, certs] = await Promise.all([cargarCaptura(), cargarNFC(), cargarCerts()]);
    certsData = certs;

    if(!OT_SELECCIONADA){
      const vistas={}, otsUnicas=[];
      captura.forEach(a=>{
        if(!vistas[a.ot]){
          const g = GANTT_FECHAS[a.ot];
          vistas[a.ot] = { ot:a.ot, equipo:a.equipo, actividad:a.actividad, componente:a.componente,
                            fechaInicio: g ? parseFechaHoraCL(g[0]) : null,
                            fechaTermino: g ? parseFechaHoraCL(g[1]) : null,
                            hrsTotal:0, hrsGanadas:0, bloqueado:"" };
          otsUnicas.push(vistas[a.ot]);
        }
        const g = vistas[a.ot];
        g.hrsTotal += a.hrs;
        g.hrsGanadas += a.hrs * a.avance / 100;
        if(a.bloqueado && !g.bloqueado) g.bloqueado = a.bloqueado;
      });
      otsUnicas.forEach(o=>{ o.avance = o.hrsTotal>0 ? Math.round(o.hrsGanadas/o.hrsTotal*100) : 0; });
      renderSelector(otsUnicas);
      huboRenderExitoso = true;
      actualizarFooter("selector de OT");
      return;
    }

    const actividades = captura.filter(a=>a.ot===OT_SELECCIONADA);
    if(!actividades.length){
      document.getElementById("tituloOT").textContent = "OT " + OT_SELECCIONADA;
      document.getElementById("contenido").innerHTML = '<div class="empty">No se encontraron actividades para esta OT en CAPTURA.</div>';
      actualizarFooter("sin datos para esta OT");
      return;
    }
    render(actividades, nfc);
    huboRenderExitoso = true;
    actualizarFooter("en vivo");
  }catch(e){
    // Si ya había un render bueno en pantalla, NO lo borramos por un fallo
    // transitorio de red — solo avisamos en el pie y reintentamos en 20s.
    if(!huboRenderExitoso){
      document.getElementById("contenido").innerHTML = '<div class="empty">Error de conexión. Reintentando…</div>';
    }
    actualizarFooter("error de conexión (manteniendo última data)");
  }
}

function actualizarFooter(fuente){
  const ahora = new Date().toLocaleTimeString("es-CL",{timeZone:"America/Santiago"});
  document.getElementById("footer").textContent = `Última actualización: ${ahora} · Fuente: ${fuente} · Se refresca cada 20 segundos`;
}
function tick(){
  document.getElementById("clock").textContent = new Date().toLocaleTimeString("es-CL",{timeZone:"America/Santiago"});
}

tick(); setInterval(tick,1000);
